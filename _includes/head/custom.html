<!-- start custom head snippets -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&display=swap" rel="stylesheet">

<style>
  :root {
    --primary-color: #2c7873;
    --accent-color: #5eb3a6;
  }

  /* 全局衬线体 */
  body, p, li, span, div {
    font-family: 'Source Serif 4', serif !important;
  }

  /* 强制所有标题 (Section Names) 应用衬线体 */
  h1, h2, h3, h4, h5, h6 {
    font-family: 'Source Serif 4', serif !important;
    font-weight: 700 !important;
  }

  /* 粗体部分强制应用衬线体 */
  strong, b {
    font-family: 'Source Serif 4', serif !important;
    font-weight: 700 !important;
  }

  /* 左上角标题手写体 */
  .masthead__menu-item--lg a, 
  .masthead__menu-item--lg,
  .site-title a,
  .site-title {
    font-family: 'Dancing Script', cursive !important;
    font-size: 1.5em !important; 
    font-weight: 700 !important;
    text-decoration: none !important;
  }

  /* 针对移动端微调标题大小 */
  @media (max-width: 768px) {
    .masthead__menu-item--lg a {
      font-size: 1.2em !important;
    }
  }

  /* Smooth transitions - 保留平滑过渡效果 */
  body, a, h1, h2, h3, h4, h5, h6, code, pre {
    transition: background-color 0.3s ease, color 0.3s ease;
  }
</style>

<style>
  /* 移除头像的圆形裁剪、边框和阴影 */
  .author__avatar img {
    border-radius: 0 !important;
    border: none !important;
    box-shadow: none !important;
    padding: 0 !important;
  }

  .author__avatar {
    border-radius: 0 !important;
    border: none !important;
    box-shadow: none !important;
    padding: 0 !important;
    background-color: transparent !important;
  }

  /* 在侧边栏姓名上方增加间距 */
  .author__content {
    margin-top: 20px !important;
  }
</style>
<!-- end custom head snippets -->
